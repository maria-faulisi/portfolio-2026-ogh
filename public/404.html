<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Maria Faulisi — Design Engineer</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Redirects the browser to index.html, encoding the current path
      // (except the root) as a query string so it can be restored there.
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
